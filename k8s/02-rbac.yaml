apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-reader
  namespace: gralnia
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-service-config-reader
  namespace: gralnia
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-reader-binding
  namespace: gralnia
subjects:
  - kind: ServiceAccount
    name: backend-reader
    namespace: gralnia
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-service-config-reader

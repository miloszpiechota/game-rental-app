apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: gralnia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-reader
      containers:
        - name: backend
          image: game-rental-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: API_SECRET_KEY
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CORS_ORIGINS
            - name: SEED_DEMO_DATA
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SEED_DEMO_DATA
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: gralnia
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000

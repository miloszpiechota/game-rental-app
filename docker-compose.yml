services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: gralnia
      MARIADB_USER: gralnia
      MARIADB_PASSWORD: gralnia_password
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://gralnia:gralnia_password@mariadb:3306/gralnia
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
      API_SECRET_KEY: local-compose-secret
      SEED_DEMO_DATA: "true"
    ports:
      - "8000:8000"
    depends_on:
      mariadb:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mariadb-data:
